<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMM Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>CMM_DASHBOARD</h1>
      <p>MODUS Inspection Report Analysis</p>
    </div>
    <nav>
      <a href="/" class="{{ 'active' if mode == 'single' else '' }}">
        Single Report
      </a>
      <a href="/trend" class="{{ 'active' if mode == 'trend' else '' }}">
        Multi-Run Trend
      </a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>CMM Dashboard — Built with Python, Pandas, Plotly, Flask</p>
  </footer>

</body>
</html>
